services:
  backend:
    build: .
    container_name: travelbuddy-backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./media:/app/media
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: travelbuddy-frontend
    working_dir: /app/web
    volumes:
      - ./web:/app/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: travelbuddy-postgres
    environment:
      POSTGRES_DB: travelbuddy
      POSTGRES_USER: travelbuddy
      POSTGRES_PASSWORD: travelbuddy
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: travelbuddy-redis

volumes:
  postgres_data:
