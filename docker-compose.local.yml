services:
  backend:
    build: .
    container_name: travelbuddy-backend
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./media:/app/media
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./web
    container_name: travelbuddy-frontend
    env_file:
      - .env.local
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
    command: npm run dev:docker

  postgres:
    image: postgres:16-alpine
    container_name: travelbuddy-postgres
    environment:
      POSTGRES_DB: travelbuddy
      POSTGRES_USER: travelbuddy
      POSTGRES_PASSWORD: travelbuddy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelbuddy -d travelbuddy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: travelbuddy-redis

volumes:
  postgres_data:
