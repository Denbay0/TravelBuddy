services:
  backend:
    build: .
    container_name: travelbuddy-backend
    env_file:
      - .env.server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./media:/app/media
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./web
    container_name: travelbuddy-frontend
    env_file:
      - .env.server
    depends_on:
      - backend
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 4173 --strictPort"

  nginx:
    image: nginx:1.27-alpine
    container_name: travelbuddy-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./deploy/nginx/travelbuddy.conf:/etc/nginx/conf.d/default.conf:ro

  postgres:
    image: postgres:16-alpine
    container_name: travelbuddy-postgres
    environment:
      POSTGRES_DB: travelbuddy
      POSTGRES_USER: travelbuddy
      POSTGRES_PASSWORD: travelbuddy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelbuddy -d travelbuddy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: travelbuddy-redis

volumes:
  postgres_data:
