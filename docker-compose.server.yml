services:
  backend:
    build: .
    container_name: travelbuddy-backend
    env_file:
      - .env.server
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./media:/app/media
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./web
    container_name: travelbuddy-frontend
    env_file:
      - .env.server
    depends_on:
      - backend
    ports:
      - "127.0.0.1:4173:4173"
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 4173 --strictPort"

  postgres:
    image: postgres:16-alpine
    container_name: travelbuddy-postgres
    environment:
      POSTGRES_DB: travelbuddy
      POSTGRES_USER: travelbuddy
      POSTGRES_PASSWORD: travelbuddy
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: travelbuddy-redis

volumes:
  postgres_data:
